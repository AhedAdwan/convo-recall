# Auto-monitor pip dependencies for CVEs + minor/patch upgrades.
# Major bumps require manual review (grouped separately so they don't auto-merge).
# See: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      python-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions in .github/workflows/*.yml
  # (caught the Node.js 20 deprecation warnings on every recent CI run —
  # auto-PRs would bump actions/checkout / actions/setup-python on schedule).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
