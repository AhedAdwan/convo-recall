name: Publish to PyPI

# Manual trigger only. PyPI Trusted Publisher is not yet configured for this
# project — auto-running on every tag push leaves a red ❌ on the repo's main
# page for every release. Trigger this workflow from the Actions tab when the
# trusted-publisher entry has been added on PyPI's side and you want to ship.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.3.1). Must already exist on origin."
        required: true

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install with dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/convo-recall
    permissions:
      id-token: write  # required for PyPI trusted publishing

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install hatchling build twine

      - name: Build distributions
        run: python -m build

      - name: Verify distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
