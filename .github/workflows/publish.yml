name: Publish to PyPI

# Manual trigger only. Triggered from the Actions tab once PyPI Trusted
# Publisher is configured (https://docs.pypi.org/trusted-publishers/).
# The `tag` input pins both the test job and the build job to the exact
# tagged tree so the published artifact matches what's at that tag —
# without it, both jobs default to whatever's at HEAD on the default
# branch, which can drift past the tag with doc/CI commits.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.4.0). Must already exist on origin."
        required: true

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install with dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/convo-recall
    permissions:
      id-token: write  # required for PyPI trusted publishing

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install hatchling build twine

      - name: Build distributions
        run: python -m build

      - name: Verify distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
